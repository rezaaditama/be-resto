server {
    # running on port 80
    listen 80;
    
    # api location
    location /api/ {
        proxy_pass http://api-resto:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Jika Apache TIDAK membuang /its-resto, buang secara internal sebelum proxy ke frontend
    location /its-resto/ {
        rewrite ^/its-resto/(.*)$ /$1 break;
        proxy_pass http://fe-its-resto:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }

    # Jika Apache SUDAH membuang /its-resto, request langsung masuk kesini
    location / {
        proxy_pass http://fe-its-resto:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }
}